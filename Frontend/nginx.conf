# =========================================================================
# KHU VỰC 1: XỬ LÝ KẾT NỐI KHÔNG BẢO MẬT (HTTP - Cổng 80)
# Nhiệm vụ: Đón chứng chỉ SSL và chặn/chuyển hướng người dùng sang HTTPS
# =========================================================================
server {
    listen 80; # Lắng nghe luồng dữ liệu trên cổng 80 (HTTP tiêu chuẩn)
    
    # Chỉ định các tên miền mà cụm Server này sẽ tiếp nhận xử lý
    server_name quizflow.systems www.quizflow.systems;

    # 1. MỞ CỬA CHO LET'S ENCRYPT VÀO KIỂM TRA TÊN MIỀN
    # Khi Certbot chạy, nó sẽ tạo một file bí mật trong '/var/www/certbot/.well-known/acme-challenge/'.
    # Tổ chức Let's Encrypt sẽ truy cập vào đường dẫn này qua mạng HTTP trần để xem file bí mật đó có tồn tại không.
    # Nếu có, chứng tỏ bạn là chủ thực sự của Server chạy tên miền này -> Bắt đầu cấp phép Ổ khóa xanh.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. ÉP BUỘC CHUYỂN HƯỚNG BẢO MẬT
    # Nếu người dùng bình thường gõ 'http://quizflow.systems' (truy cập vào rễ '/'), 
    # Nginx sẽ vứt trả lại mã 301 (Moved Permanently) và chuyển hướng họ sang đường dẫn có HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================================================
# KHU VỰC 2: XỬ LÝ KẾT NỐI BẢO MẬT (HTTPS - Cổng 443)
# Nhiệm vụ: Nơi ở chính của ứng dụng, điều hướng Web tĩnh và điều hướng API
# =========================================================================
server {
    listen 443 ssl; # Lắng nghe trên cổng 443 và BẮT BUỘC dùng SSL (mã hóa)
    server_name quizflow.systems www.quizflow.systems;

    # 3. KẾT NỐI VỚI Ổ KHÓA XANH (CERTIFICATES)
    # Đường dẫn trỏ tới 2 file chứng chỉ gốc do Certbot sinh ra. 
    # (Lưu ý: Nếu Nginx bật lên mà không tìm thấy 2 file này, Nginx sẽ CHẾT ngay lập tức)
    ssl_certificate /etc/letsencrypt/live/quizflow.systems/fullchain.pem; # Giấy chứng nhận công khai
    ssl_certificate_key /etc/letsencrypt/live/quizflow.systems/privkey.pem; # Chìa khóa riêng tư (Tuyệt đối bảo mật)

    # CẤU HÌNH BẢO MẬT BỔ SUNG ( tạm tắt để tránh lỗi thiếu file)
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 4. PHÂN PHỐI GIAO DIỆN WEB (FRONTEND - REACTJS/VUEJS)
    location / {
        root   /usr/share/nginx/html; # Thư mục chứa các file Web tĩnh (.html, .css, .js) đã được Build ra
        index  index.html index.htm;
        
        # Cơ chế định tuyến của Single Page Application (SPA)
        # Nginx sẽ thử tìm file theo đường dẫn ($uri), nếu không thấy file, 
        # nó phải trả về file gốc 'index.html' để React Router tự xử lý việc chuyển trang, thay vì báo lỗi 404.
        try_files $uri $uri/ /index.html;
    }

    # 5. ĐIỀU HƯỚNG YÊU CẦU API VỀ BÊN BACKEND (REVERSE PROXY)
    location /api/v1/ {
        # Đẩy tất cả truy cập có tiền tố '/api/v1/' xuống cho Container Backend xử lý ở cổng 8080
        proxy_pass http://quizflow-backend:8080/api/v1/;
        
        # Mang theo các thông tin gốc của người dùng gửi cho Backend (Vì Backend bị đứng nấp sau Nginx)
        proxy_set_header Host $host; # Tên miền người dùng đang gõ
        proxy_set_header X-Real-IP $remote_addr; # Địa chỉ IP thật của người dùng (Nếu không có, Backend sẽ nghĩ Nginx tự truy cập)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # Tiếng lóng báo cho Backend biết: "Người dùng đang dùng HTTPS đấy, gửi link ảnh nhớ chèn https:// vào!"
    }

    # 6. ĐIỀU HƯỚNG YÊU CẦU REALTIME (WEBSOCKET)
    # Khác với HTTP gọi 1 phát đứt luôn, WebSocket duy trì ống bô kết nối liên tục để Chat/Thi trực tuyến.
    location /ws/ {
        proxy_pass http://quizflow-backend:8080/ws/;
        
        # Ba dòng dưới đây là cấu hình "Nâng cấp (Upgrade)" từ giao thức HTTP bình thường lên WebSocket.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Bê nguyên các thông tin người dùng từ bên API xuống
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
